<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#131314" />

    <title>AI Carousel Maker — Instatools</title>

    <!-- Primary SEO Meta -->
    <meta
      name="description"
      content="Generate high-converting LinkedIn and Instagram carousels with AI, inside the Instatools workspace."
    />
    <meta
      name="keywords"
      content="AI carousel maker, LinkedIn carousel generator, Instagram carousel tool, Instatools"
    />
    <meta
      name="robots"
      content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1"
    />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://instatools.app/tools/ai-carousel-maker/"
    />

    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Instatools" />
    <meta property="og:title" content="AI Carousel Maker — Instatools" />
    <meta
      property="og:description"
      content="Use AI to generate and edit carousels, powered by the open‑source Carousel Generator, inside Instatools."
    />
    <meta
      property="og:url"
      content="https://instatools.app/tools/ai-carousel-maker/"
    />
    <meta
      property="og:image"
      content="https://instatools.app/src/ui/share.png"
    />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Carousel Maker — Instatools" />
    <meta
      name="twitter:description"
      content="Generate LinkedIn and Instagram carousels with AI in the Instatools interface."
    />
    <meta
      name="twitter:image"
      content="https://instatools.app/src/ui/share.png"
    />

    <!-- Same stack as main app -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Inherit ALL main-app styles (sidebar, buttons, inputs, etc.) -->
    <link rel="stylesheet" href="../../css/styles.css" />

    <style>
      #preview-container {
        overflow: hidden;
      }

      #preview-container-dotgrid {
        position: absolute;
        inset: 0;
        opacity: 0.03;
        background-image: radial-gradient(#000 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
        z-index: 0;
      }

      .carousel-iframe-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        max-width: 1200px;
        max-height: 100%;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #050608;
        display: flex;
        flex-direction: column;
      }

      .carousel-iframe {
        flex: 1;
        border: none;
        width: 100%;
        height: 100%;
        background: #050608;
      }

      .carousel-iframe-note {
        font-size: 10px;
        color: rgba(221, 221, 221, 0.45);
        padding: 6px 14px 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(
          to bottom,
          rgba(5, 6, 8, 0.95),
          rgba(5, 6, 8, 1)
        );
      }

      @media (max-width: 768px) {
        .carousel-iframe-wrapper {
          border-radius: 12px;
        }
      }
    </style>
  </head>

  <body
    class="bg-[#131314] text-gray-900 font-sans flex flex-col h-screen overflow-hidden selection:bg-black selection:text-white"
  >
    <!-- Initial Loader -->
    <div id="initial-loader">
      <div class="loader"></div>
    </div>

    <!-- Main Wrapper -->
    <div class="my-container flex-1 flex flex-col h-full overflow-hidden">
      <!-- Top Nav -->
      <nav
        class="navbar top-navbar navbar-light bg-[#131314] px-5 flex-shrink-0 border-b border-neutral-800"
      >
        <div class="flex items-center justify-between w-full">
          <!-- Left: Logo -->
          <div class="flex items-center gap-3">
            <div class="mobile-logo-container">
              <img
                src="../../src/ui/logo.png"
                alt="Instatools"
                style="height: 32px; width: auto; display: block"
              />
            </div>
          </div>

          <!-- Right: Other tools + Support -->
          <div class="flex items-center gap-3">
            <div
              class="flex bg-black p-1 rounded-lg gap-1 mode-buttons-container"
            >
              <a
                href="../other/index.html"
                class="px-6 py-1.5 text-xs font-bold uppercase rounded-md transition-all-200 bg-white text-black hover:text-[#ec7258] shadow-sm hover:shadow-md flex items-center justify-center cursor-pointer"
                style="
                  min-width: 120px;
                  min-height: 32px;
                  text-decoration: none;
                "
                >OTHER TOOLS</a
              >
            </div>
            <a
              href="https://buymeacoffee.com/galore"
              target="_blank"
              rel="noopener noreferrer"
              class="export-header-btn"
              style="
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 6px;
              "
            >
              SUPPORT US
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="white"
                stroke="none"
                style="flex-shrink: 0"
              >
                <path
                  d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                />
              </svg>
            </a>
          </div>
        </div>
      </nav>

      <!-- Preview Area -->
      <div
        id="preview-container"
        class="flex-1 bg-[#131314] flex items-center justify-center overflow-hidden h-full relative"
        style="padding: 24px"
      >
        <div id="preview-container-dotgrid"></div>

        <div class="carousel-iframe-wrapper">
          <!-- Embedded Carousel Generator app -->
          <iframe
            class="carousel-iframe"
            src="https://carouselgenerator.vercel.app"
            title="AI Carousel Maker"
            loading="lazy"
          ></iframe>

          <div class="carousel-iframe-note">
            This AI carousel maker is embedded from the open‑source
            <a
              href="https://github.com/FranciscoMoretti/carousel-generator"
              target="_blank"
              rel="noopener noreferrer"
              style="font-weight: 600; color: #e5e7eb; text-decoration: underline; text-decoration-style: dotted;"
              >Carousel Generator</a
            >. Your prompts and content are handled by their app; Instatools
            does not store any of this data.
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0"
      crossorigin="anonymous"
    ></script>

    <!-- Initial Loader Logic -->
    <script>
      window.addEventListener("load", function () {
        setTimeout(function () {
          var loader = document.getElementById("initial-loader");
          if (loader) {
            loader.style.opacity = "0";
            loader.style.visibility = "hidden";
            setTimeout(function () {
              loader.remove();
            }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
